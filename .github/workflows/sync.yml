name: Sync fork

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - run: gh api -X POST "repos/${{ github.repository }}/merge-upstream" -f branch=main
        env:
          GH_TOKEN: ${{ github.token }}
